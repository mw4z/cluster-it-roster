<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cluster IT Support - Roster</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    .header { background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%); padding: 20px; text-align: center; border-bottom: 2px solid #334155; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 1.4rem; color: #60a5fa; margin-bottom: 8px; }
    .eid-banner { background: linear-gradient(135deg, #854d0e, #a16207, #854d0e); color: #fef3c7; padding: 12px; text-align: center; font-size: 1.1rem; font-weight: 700; display: none; }

    .date-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 10px; }
    .date-nav button { background: #334155; color: #e2e8f0; border: 1px solid #475569; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .date-nav button:hover { background: #475569; }
    .date-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
    .date-nav button.today-btn { background: #2563eb; border-color: #3b82f6; }
    .date-nav button.today-btn:hover { background: #1d4ed8; }
    .date-display { font-size: 1.1rem; font-weight: 600; color: #f1f5f9; min-width: 200px; text-align: center; }
    .date-display .day-name { color: #60a5fa; font-size: 0.85rem; }

    .tabs { display: flex; justify-content: center; gap: 6px; padding: 12px 16px; background: #1e293b; border-bottom: 1px solid #334155; overflow-x: auto; }
    .tab { padding: 8px 14px; border-radius: 20px; border: 1px solid #475569; background: transparent; color: #94a3b8; cursor: pointer; font-size: 0.82rem; white-space: nowrap; transition: all 0.2s; }
    .tab:hover { color: #e2e8f0; border-color: #60a5fa; }
    .tab.active { background: #2563eb; color: white; border-color: #2563eb; }

    .stats-bar { display: flex; justify-content: center; gap: 20px; padding: 14px 20px; background: #1e293b; border-bottom: 1px solid #334155; flex-wrap: wrap; }
    .stat { text-align: center; padding: 6px 14px; background: #0f172a; border-radius: 10px; border: 1px solid #334155; }
    .stat .value { font-size: 1.3rem; font-weight: 700; color: #60a5fa; }
    .stat .label { font-size: 0.7rem; color: #94a3b8; margin-top: 2px; }

    .content { max-width: 750px; margin: 0 auto; padding: 16px; }

    /* Shift Card */
    .shift-card { background: #1e293b; border-radius: 12px; margin-bottom: 12px; overflow: hidden; border: 1px solid #334155; }
    .shift-header { padding: 12px 18px; font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
    .shift-header .count { margin-left: auto; background: #334155; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; color: #94a3b8; }
    .shift-morning .shift-header { border-left: 4px solid #06b6d4; }
    .shift-between .shift-header { border-left: 4px solid #f59e0b; }
    .shift-evening .shift-header { border-left: 4px solid #a855f7; }
    .shift-night .shift-header { border-left: 4px solid #6366f1; }
    .shift-off .shift-header { border-left: 4px solid #6b7280; }
    .shift-leave .shift-header { border-left: 4px solid #22c55e; }
    .shift-task .shift-header { border-left: 4px solid #ec4899; }
    .shift-holiday .shift-header { border-left: 4px solid #eab308; }
    .shift-body { padding: 0 18px 12px; }

    .employee-row { padding: 8px 12px; margin: 4px 0; background: #0f172a; border-radius: 8px; font-size: 0.88rem; display: flex; align-items: center; gap: 10px; }
    .employee-row.called-in { border-left: 3px solid #ef4444; background: #1c1117; }
    .emp-name { flex: 1; }
    .emp-time { font-size: 0.75rem; color: #64748b; background: #1e293b; padding: 2px 8px; border-radius: 4px; }
    .called-in-badge { font-size: 0.65rem; background: #991b1b; color: #fca5a5; padding: 2px 6px; border-radius: 4px; }
    .employee-row.is-incharge { border-left: 3px solid #f59e0b; background: #1a1708; }
    .employee-row.called-in.is-incharge { border-left: 3px solid #f59e0b; background: #1c1310; }
    .incharge-badge { font-size: 0.65rem; background: #854d0e; color: #fef3c7; padding: 2px 8px; border-radius: 4px; font-weight: 700; }
    .shift-edit-btn { font-size: 0.65rem; background: #334155; color: #94a3b8; padding: 2px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #475569; transition: all 0.2s; }
    .shift-edit-btn:hover { background: #475569; color: #e2e8f0; }
    .shift-select { background: #1e293b; border: 1px solid #60a5fa; color: #e2e8f0; padding: 4px 6px; border-radius: 6px; font-size: 0.78rem; cursor: pointer; }
    .shift-select:focus { outline: none; }
    .shift-modified { background: #172554 !important; border: 1px dashed #3b82f6 !important; }
    .modified-badge { font-size: 0.6rem; background: #1e3a5f; color: #60a5fa; padding: 2px 6px; border-radius: 4px; }

    /* Panel (shared) */
    .panel { background: #1e293b; border-radius: 12px; padding: 18px; margin-bottom: 16px; border: 1px solid #334155; }
    .panel h3 { color: #60a5fa; margin-bottom: 14px; font-size: 1rem; }
    .employee-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .emp-chip { background: #0f172a; padding: 8px 14px; border-radius: 10px; font-size: 0.85rem; border: 1px solid #334155; display: flex; flex-direction: column; gap: 2px; }
    .emp-chip .chip-time { font-size: 0.7rem; color: #64748b; }

    /* Occupancy Tab */
    .occ-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .occ-card { background: #0f172a; border-radius: 10px; padding: 16px; border: 1px solid #334155; text-align: center; }
    .occ-card .hotel-icon { font-size: 1.8rem; margin-bottom: 6px; }
    .occ-card .hotel-label { font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; }
    .occ-card input {
      width: 80px; background: #1e293b; border: 1px solid #475569; color: #e2e8f0;
      padding: 8px; border-radius: 8px; font-size: 1.2rem; text-align: center; font-weight: 700;
    }
    .occ-card input:focus { outline: none; border-color: #60a5fa; }
    .occ-card .pct { color: #64748b; font-size: 1rem; margin-left: 4px; }
    .occ-bar { margin-top: 10px; background: #1e293b; border-radius: 6px; height: 8px; overflow: hidden; }
    .occ-bar-fill { height: 100%; border-radius: 6px; transition: width 0.3s; }

    .save-btn {
      margin-top: 14px; width: 100%; padding: 10px; background: #2563eb; color: white;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all 0.2s;
    }
    .save-btn:hover { background: #1d4ed8; }
    .save-msg { text-align: center; color: #22c55e; font-size: 0.8rem; margin-top: 8px; display: none; }


    .ic-current { margin-top: 8px; font-size: 0.8rem; color: #94a3b8; }
    .ic-current strong { color: #f59e0b; }

    .loading { text-align: center; padding: 60px 20px; color: #64748b; }
    .spinner { width: 36px; height: 36px; border: 3px solid #334155; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-msg { text-align: center; padding: 40px; color: #f87171; background: #1e293b; border-radius: 12px; margin: 20px; }
    .empty-msg { text-align: center; padding: 30px; color: #64748b; font-size: 0.9rem; }
    .refresh-info { text-align: center; padding: 8px; font-size: 0.7rem; color: #475569; }
    .live-dot { display: inline-block; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; margin-right: 4px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    @media (max-width: 600px) {
      .header h1 { font-size: 1.1rem; }
      .date-nav button { padding: 6px 10px; font-size: 0.85rem; }
      .date-display { font-size: 0.95rem; min-width: 140px; }
      .stats-bar { gap: 8px; }
      .stat { padding: 4px 10px; }
      .stat .value { font-size: 1.1rem; }
      .occ-grid { grid-template-columns: 1fr; }
      .tabs { gap: 4px; padding: 10px 10px; }
      .tab { padding: 6px 10px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cluster IT Support - Daily Roster</h1>
    <div class="date-nav">
      <button id="prevBtn" onclick="changeDate(-1)">&#9664;</button>
      <div class="date-display">
        <div class="day-name" id="dayName"></div>
        <div id="dateText"></div>
      </div>
      <button id="nextBtn" onclick="changeDate(1)">&#9654;</button>
      <button class="today-btn" onclick="goToday()">Today</button>
    </div>
  </div>

  <div class="eid-banner" id="eidBanner">&#127769;&#10024; Eid Mubarak! &#10024;&#127769;</div>

  <div class="tabs">
    <button class="tab active" data-view="roster" onclick="switchView('roster')">Roster</button>
    <button class="tab" data-view="office" onclick="switchView('office')">In Office</button>
    <button class="tab" data-view="occupancy" onclick="switchView('occupancy')">Occupancy</button>

    <button class="tab" data-view="salary" onclick="switchView('salary')">Salary</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>
  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </div>
  <div class="refresh-info"><span class="live-dot"></span> Auto-refreshes every 5 minutes</div>

  <script>
    let currentDate = new Date();
    let availableDates = [];
    let currentIndex = -1;
    let currentView = 'roster';
    let currentRosterData = null;
    let currentDailyData = { occupancy: {}, inCharge: {}, shiftOverrides: {} };

    const hotels = [
      { key: 'Fairmont', name: 'Fairmont Hotel', icon: '🏨' },
      { key: 'Raffles', name: 'Raffles Hotel', icon: '🏨' },
      { key: 'SwissMakkah', name: 'Swiss Makkah Hotel', icon: '🏨' },
      { key: 'SwissAlMaqam', name: 'Swiss Al Maqam Hotel', icon: '🏨' }
    ];

    function formatDateParam(d) {
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      if (view === 'roster') loadRoster();
      else if (view === 'office') loadOfficeNow();
      else if (view === 'occupancy') loadOccupancy();

      else if (view === 'salary') loadSalary();
    }

    function changeDate(delta) {
      const newIdx = currentIndex + delta;
      if (availableDates.length > 0 && newIdx >= 0 && newIdx < availableDates.length) {
        currentIndex = newIdx;
        currentDate = new Date(availableDates[newIdx] + 'T12:00:00');
        currentRosterData = null;
        switchView(currentView);
      }
    }

    function goToday() { currentDate = new Date(); currentRosterData = null; syncIndex(); switchView(currentView); }

    function getShiftClass(label) {
      if (label.includes('Morning')) return 'shift-morning';
      if (label.includes('Between')) return 'shift-between';
      if (label.includes('Evening')) return 'shift-evening';
      if (label.includes('Night')) return 'shift-night';
      if (label.includes('Day Off') || label.includes('Pending') || label.includes('Compensation')) return 'shift-off';
      if (label.includes('Task') || label.includes('Training')) return 'shift-task';
      if (label.includes('Holiday') || label.includes('Eid')) return 'shift-holiday';
      if (label.includes('Leave') || label.includes('Sick') || label.includes('Vacation')) return 'shift-leave';
      return 'shift-off';
    }

    async function loadDailyData(dateStr) {
      try {
        const res = await fetch(`/api/daily-data?date=${dateStr}`);
        currentDailyData = await res.json();
        if (!currentDailyData.occupancy) currentDailyData.occupancy = {};

        if (!currentDailyData.inCharge) currentDailyData.inCharge = {};
      } catch (e) {
        currentDailyData = { occupancy: {}, inCharge: {}, shiftOverrides: {} };
      }
    }

    async function saveField(field, data) {
      const dateStr = currentRosterData?.date;
      if (!dateStr) return;
      currentDailyData[field] = data;
      try {
        await fetch('/api/daily-data', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: dateStr, ...currentDailyData })
        });
        const msg = document.getElementById('saveMsg');
        if (msg) { msg.style.display = 'block'; setTimeout(() => msg.style.display = 'none', 2000); }
      } catch (e) { console.error('Save failed:', e); }
    }

    function saveOccupancy() {
      const occ = {};
      hotels.forEach(h => {
        const input = document.getElementById('occ-' + h.key);
        if (input && input.value) occ[h.key] = parseInt(input.value) || 0;
      });
      // Update bar fills
      hotels.forEach(h => {
        const val = occ[h.key] || 0;
        const fill = document.getElementById('occ-bar-' + h.key);
        if (fill) {
          fill.style.width = val + '%';
          fill.style.background = val > 85 ? '#ef4444' : val > 60 ? '#f59e0b' : '#22c55e';
        }
      });
      saveField('occupancy', occ);
    }


    function saveInCharge() {
      const ic = {};
      document.querySelectorAll('.incharge-select').forEach(sel => {
        if (sel.value) ic[sel.dataset.shift] = sel.value;
      });
      saveField('inCharge', ic).then(() => renderRoster());
    }

    function editShift(empName) {
      const shiftCodes = currentRosterData?.shiftCodes || [];
      if (!shiftCodes.length) return;
      const overrides = currentDailyData.shiftOverrides || {};
      const currentCode = overrides[empName] || '';

      // Build a popup inline
      let opts = '<option value="">-- Original --</option>';
      shiftCodes.forEach(s => {
        opts += `<option value="${s.code}"${s.code === currentCode ? ' selected' : ''}>${s.label}</option>`;
      });

      const row = event.target.closest('.employee-row');
      const existing = row.querySelector('.shift-select');
      if (existing) { existing.remove(); return; } // toggle off

      const sel = document.createElement('select');
      sel.className = 'shift-select';
      sel.innerHTML = opts;
      sel.onchange = function() {
        const val = this.value;
        if (!currentDailyData.shiftOverrides) currentDailyData.shiftOverrides = {};
        if (val) {
          currentDailyData.shiftOverrides[empName] = val;
        } else {
          delete currentDailyData.shiftOverrides[empName];
        }
        saveField('shiftOverrides', currentDailyData.shiftOverrides).then(() => renderRoster());
      };
      row.appendChild(sel);
      sel.focus();
    }

    async function ensureAvailableDates() {
      if (availableDates.length > 0) return;
      const res = await fetch(`/api/roster?date=${formatDateParam(currentDate)}`);
      const data = await res.json();
      availableDates = data.availableDates || [];

      if (data.notFound && availableDates.length > 0) {
        const todayStr = formatDateParam(currentDate);
        const future = availableDates.find(d => d >= todayStr);
        const target = future || availableDates[availableDates.length - 1];
        currentIndex = availableDates.indexOf(target);
        currentDate = new Date(target + 'T12:00:00');
      }

      const curMD = formatDateParam(currentDate).slice(5);
      currentIndex = availableDates.findIndex(d => d.slice(5) === curMD);
      if (currentIndex === -1) currentIndex = availableDates.indexOf(formatDateParam(currentDate));
    }

    function syncIndex() {
      const dateStr = formatDateParam(currentDate);
      currentIndex = availableDates.indexOf(dateStr);
      if (currentIndex === -1) {
        const curMD = dateStr.slice(5);
        currentIndex = availableDates.findIndex(d => d.slice(5) === curMD);
      }
    }

    async function fetchRoster() {
      const res = await fetch(`/api/roster?date=${formatDateParam(currentDate)}`);
      currentRosterData = await res.json();
      if (availableDates.length === 0) availableDates = currentRosterData.availableDates || [];
      await loadDailyData(currentRosterData.date);
    }

    function updateNav() {
      if (currentRosterData) {
        document.getElementById('dayName').textContent = currentRosterData.dayName;
        document.getElementById('dateText').textContent = currentRosterData.dateFormatted;
        document.getElementById('eidBanner').style.display = currentRosterData.isEid ? 'block' : 'none';
      }
      document.getElementById('prevBtn').disabled = currentIndex <= 0;
      document.getElementById('nextBtn').disabled = currentIndex >= availableDates.length - 1;
    }

    // ==================== ROSTER ====================
    function renderRoster() {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      const data = currentRosterData;
      if (!data) return;

      let totalWorking = 0, totalOff = 0;
      data.shifts.forEach(s => {
        const lbl = s.label;
        if (['Morning','Between','Evening','Night','Task','Training'].some(w => lbl.includes(w))) totalWorking += s.employees.length;
        else totalOff += s.employees.length;
      });

      statsBar.innerHTML = `
        <div class="stat"><div class="value">${totalWorking}</div><div class="label">Working</div></div>
        <div class="stat"><div class="value">${totalOff}</div><div class="label">Off / Leave</div></div>
        <div class="stat"><div class="value">${totalWorking + totalOff}</div><div class="label">Total</div></div>`;

      if (data.shifts.length === 0) { content.innerHTML = '<div class="empty-msg">No roster data found.</div>'; return; }

      const overrides = currentDailyData.shiftOverrides || {};
      const shiftCodes = data.shiftCodes || [];

      // Rebuild shifts with overrides applied
      const allEmployees = [];
      data.shifts.forEach(shift => {
        shift.employees.forEach(emp => {
          allEmployees.push({ ...emp, originalLabel: shift.label });
        });
      });

      const rebuiltShifts = {};
      allEmployees.forEach(emp => {
        const overrideCode = overrides[emp.name];
        let targetLabel = emp.originalLabel;
        if (overrideCode) {
          const found = shiftCodes.find(s => s.code === overrideCode);
          if (found) targetLabel = found.label;
        }
        if (!rebuiltShifts[targetLabel]) rebuiltShifts[targetLabel] = [];
        rebuiltShifts[targetLabel].push({ ...emp, modified: !!overrideCode, currentLabel: targetLabel });
      });

      const shiftOrder = data.shifts.map(s => s.label);
      shiftCodes.forEach(s => { if (!shiftOrder.includes(s.label)) shiftOrder.push(s.label); });

      const workingShifts = [];
      const savedIC = currentDailyData.inCharge || {};
      const priority = data.inChargePriority || [];

      // Auto-assign in-charge per shift based on priority (if no manual override)
      const effectiveIC = {};
      shiftOrder.forEach(label => {
        const employees = rebuiltShifts[label];
        if (!employees || employees.length === 0) return;
        if (!['Morning','Between','Evening','Night'].some(w => label.includes(w))) return;
        if (savedIC[label]) {
          effectiveIC[label] = savedIC[label];
        } else {
          const names = employees.map(e => e.name);
          const auto = priority.find(p => names.includes(p));
          if (auto) effectiveIC[label] = auto;
        }
      });

      let html = '';
      shiftOrder.forEach(label => {
        const employees = rebuiltShifts[label];
        if (!employees || employees.length === 0) return;
        const cls = getShiftClass(label);
        const icName = effectiveIC[label] || '';
        const isManual = !!savedIC[label];
        if (['Morning','Between','Evening','Night'].some(w => label.includes(w))) {
          workingShifts.push({ label, employees });
        }
        html += `<div class="shift-card ${cls}"><div class="shift-header">${label}<span class="count">${employees.length}</span></div><div class="shift-body">`;
        employees.forEach(emp => {
          const isIC = icName && emp.name === icName;
          const ci = (emp.calledIn ? ' called-in' : '') + (isIC ? ' is-incharge' : '');
          const modCls = emp.modified ? ' shift-modified' : '';
          let badge = '';
          if (isIC) badge += '<span class="incharge-badge">🔑 IN-CHARGE</span>';
          if (emp.calledIn) badge += '<span class="called-in-badge">CALLED IN</span>';
          if (emp.modified) badge += '<span class="modified-badge">MODIFIED</span>';
          const time = emp.rawTime ? `<span class="emp-time">${emp.rawTime}</span>` : '';
          const editBtn = `<span class="shift-edit-btn" onclick="editShift('${emp.name.replace(/'/g, "\\'")}')">Edit</span>`;
          html += `<div class="employee-row${ci}${modCls}"><span class="emp-name">${emp.name}</span>${time}${badge}${editBtn}</div>`;
        });
        html += '</div></div>';
      });

      // In-Charge per shift section (manual override)
      if (workingShifts.length > 0) {
        html += '<div class="panel"><h3>🔑 In-Charge Per Shift</h3>';
        html += '<p style="color:#64748b; font-size:0.75rem; margin-bottom:12px;">Auto-assigned by priority. Change manually if needed.</p>';
        workingShifts.forEach(s => {
          const current = effectiveIC[s.label] || '';
          const isManual = !!savedIC[s.label];
          const autoTag = !isManual && current ? ' (auto)' : '';
          html += `<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
            <label style="font-size:0.85rem; color:#f59e0b; font-weight:600; min-width:120px;">${s.label}</label>
            <select class="incharge-select" data-shift="${s.label}" onchange="saveInCharge()"
              style="flex:1; background:#0f172a; border:1px solid #475569; color:#e2e8f0; padding:8px 10px; border-radius:8px; font-size:0.85rem;">
              <option value="">-- Auto (Priority) --</option>`;
          s.employees.forEach(emp => {
            html += `<option value="${emp.name}"${emp.name === current && isManual ? ' selected' : ''}>${emp.name}</option>`;
          });
          html += `</select></div>`;
        });
        html += '<div class="save-msg" id="saveMsg">Saved!</div></div>';
      }

      content.innerHTML = html;
    }

    async function loadRoster() {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading roster...</div>';

      try {
        await ensureAvailableDates();
        syncIndex();
        await fetchRoster();
        updateNav();
        renderRoster();
      } catch (err) { content.innerHTML = `<div class="error-msg">${err.message}</div>`; }
    }

    // ==================== IN OFFICE ====================
    async function loadOfficeNow() {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      document.getElementById('eidBanner').style.display = 'none';
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Checking...</div>';
      statsBar.innerHTML = '';
      try {
        await ensureAvailableDates();
        syncIndex();
        updateNav();
        const res = await fetch('/api/office-now');
        const data = await res.json();
        statsBar.innerHTML = `
          <div class="stat"><div class="value">${data.employees?.length || 0}</div><div class="label">In Office</div></div>
          <div class="stat"><div class="value">${data.time || '--:--'}</div><div class="label">Time</div></div>
          <div class="stat"><div class="value">${(data.activeShifts||[]).join(', ')||'-'}</div><div class="label">Active</div></div>`;
        if (!data.employees?.length) { content.innerHTML = '<div class="empty-msg">No one is currently in the office.</div>'; return; }
        let html = '<div class="panel"><h3>Currently in Office</h3><div class="employee-chips">';
        data.employees.forEach(emp => {
          html += `<div class="emp-chip">${emp.name}${emp.rawTime ? `<span class="chip-time">${emp.rawTime}</span>` : ''}</div>`;
        });
        content.innerHTML = html + '</div></div>';
      } catch (err) { content.innerHTML = `<div class="error-msg">${err.message}</div>`; }
    }

    // ==================== OCCUPANCY ====================
    async function loadOccupancy() {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      content.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

      try {
        await ensureAvailableDates();
        syncIndex();
        await loadDailyData(formatDateParam(currentDate));
        updateNav();

        const occ = currentDailyData.occupancy || {};
        const vals = hotels.map(h => occ[h.key] || 0);
        const avg = vals.some(v => v > 0) ? Math.round(vals.filter(v => v > 0).reduce((a, b) => a + b, 0) / vals.filter(v => v > 0).length) : 0;

        statsBar.innerHTML = `<div class="stat"><div class="value">${avg}%</div><div class="label">Avg Occupancy</div></div>`;

        let html = '<div class="panel"><h3>Hotel Occupancy</h3><div class="occ-grid">';
        hotels.forEach(h => {
          const val = occ[h.key] || '';
          const numVal = parseInt(val) || 0;
          const barColor = numVal > 85 ? '#ef4444' : numVal > 60 ? '#f59e0b' : '#22c55e';
          html += `<div class="occ-card">
            <div class="hotel-icon">${h.icon}</div>
            <div class="hotel-label">${h.name}</div>
            <input type="number" id="occ-${h.key}" min="0" max="100" value="${val}" placeholder="--" oninput="saveOccupancy()">
            <span class="pct">%</span>
            <div class="occ-bar"><div class="occ-bar-fill" id="occ-bar-${h.key}" style="width:${numVal}%; background:${barColor};"></div></div>
          </div>`;
        });
        html += '</div>';
        html += '<div class="save-msg" id="saveMsg">Saved!</div></div>';
        content.innerHTML = html;
      } catch (err) { content.innerHTML = `<div class="error-msg">${err.message}</div>`; }
    }


    // ==================== SALARY ====================
    async function loadSalary() {
      const content = document.getElementById('content');
      const statsBar = document.getElementById('statsBar');
      document.getElementById('eidBanner').style.display = 'none';
      statsBar.innerHTML = '';
      try {
        await ensureAvailableDates();
        syncIndex();
        updateNav();
        const res = await fetch('/api/salary');
        const data = await res.json();
        statsBar.innerHTML = `
          <div class="stat"><div class="value">${data.daysLeft}</div><div class="label">Days Left</div></div>
          <div class="stat"><div class="value">${data.salaryDate}</div><div class="label">Salary Date</div></div>`;
        const progress = Math.max(0, Math.min(100, ((30 - data.daysLeft) / 30) * 100));
        content.innerHTML = `<div class="panel" style="text-align:center;">
            <h3>Salary Countdown</h3>
            <div style="font-size:3rem; font-weight:700; color:#60a5fa; margin:20px 0;">${data.daysLeft} days</div>
            <div style="background:#0f172a; border-radius:10px; height:20px; overflow:hidden; margin:16px 0;">
              <div style="background:linear-gradient(90deg,#2563eb,#60a5fa); height:100%; width:${progress}%; border-radius:10px; transition:width 0.5s;"></div>
            </div>
            <div style="color:#94a3b8; font-size:0.85rem;">Next salary: ${data.salaryDate}</div>
          </div>`;
      } catch (err) { content.innerHTML = `<div class="error-msg">${err.message}</div>`; }
    }

    loadRoster();
    setInterval(() => switchView(currentView), 5 * 60 * 1000);
  </script>
</body>
</html>
